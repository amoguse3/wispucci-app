<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Wispucci — Cinema (magazine spread)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css?v=28" />

<style>
/* ===========================================================================
   CINEMA DEMO — Magazine spread + GSAP, no right panel.
   Single-column overlay, 5 acts (Află → Tu → Aha → Mai mult → Practică),
   4 spread variants (Cascade / Karaoke / Orbital / Spotlight),
   Pokémon-Go style pre-practica flash deck + score-driven finale.
=========================================================================== */

html, body { height: 100%; }
body {
  margin: 0;
  overflow: hidden;
  background: var(--bg-base, #210124);
  color: var(--text, #F4FDAF);
  font-family: 'Inter', system-ui, sans-serif;
}

/* ─── Orb host — centred, no offset (no right panel anymore) ────── */
.c3d-orb-host {
  position: fixed;
  left: 50%;
  top: 50%;
  width: 320px;
  height: 320px;
  transform: translate(-50%, -50%);
  z-index: 2;
  pointer-events: none;
  display: grid;
  place-items: center;
  transition: transform .6s cubic-bezier(.66,.04,.21,1.06), width .6s ease, height .6s ease;
}
.c3d-orb-host .orb { width: 100%; height: 100%; }

/* In Act 2/4 (stage mode) the orb shrinks + sits to the right of the code stage */
body.layout-stage .c3d-orb-host {
  width: 220px;
  height: 220px;
  transform: translate(-50%, -50%) translate(260px, -10px);
}
@media (max-width: 900px) {
  body.layout-stage .c3d-orb-host {
    width: 140px; height: 140px;
    transform: translate(-50%, -50%) translate(0, -240px);
  }
}

/* Act 5 (Practica) reuses the same stage layout as Act 2 — code-stage
   on the left, orb on the right, answer cards below in .c3d-task.
   No quiz-specific layout class needed. */

/* ─── Orb emotions — SVG attributes are set in JS (setOrbEmotion) ─── */
.orb .mouth        { transition: d .35s ease, stroke-width .25s ease; }
.orb .face-eyes .eye { transition: ry .25s ease, cy .25s ease; }
.orb .cheek        { transition: r .25s ease, opacity .25s ease, fill .25s ease; }
.orb.is-wow .cheek   { opacity: 0.7 !important; fill: rgba(255, 182, 193, 0.5) !important; }
.orb.is-celebrating .cheek { opacity: 0.85 !important; fill: rgba(255, 182, 193, 0.6) !important; }
.orb.is-confused .face-eyes .eye-shine { opacity: 0; }
.orb.is-wow .face-eyes { animation: orbEyeSparkle .9s ease-in-out infinite; }
@keyframes orbEyeSparkle { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }

/* ─── Act 2/4 code stage (interactive + auto-walkthrough demos) ──── */
.c3d-stage {
  position: fixed;
  left: 50%;
  top: 50%;
  z-index: 4;
  width: min(560px, 88vw);
  /* sit centred with orb to its right */
  transform: translate(-50%, -50%) translate(-180px, -10px);
  background: rgba(33, 1, 36, 0.78);
  border: 1px solid rgba(239, 221, 141, 0.32);
  border-radius: 16px;
  padding: 22px 26px;
  backdrop-filter: blur(10px);
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(239, 221, 141, 0.04) inset;
  display: flex;
  flex-direction: column;
  gap: 16px;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity .55s ease, visibility .55s, transform .55s ease;
}
body.layout-stage .c3d-stage {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
}
.c3d-stage-caption {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: clamp(20px, 2.6vw, 28px);
  color: var(--accent-soft);
  text-align: left;
  line-height: 1.15;
  min-height: 32px;
  transition: opacity .35s ease;
}
.c3d-stage-caption em { color: var(--accent); }
.c3d-stage-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(18px, 2.1vw, 24px);
  line-height: 1.55;
  color: var(--text);
  background: rgba(20, 0, 22, 0.55);
  border-radius: 10px;
  padding: 16px 20px;
  border-left: 3px solid var(--accent);
  white-space: pre-wrap;
}
.c3d-stage-code .tok-kw  { color: #C792EA; }
.c3d-stage-code .tok-fn  { color: var(--accent); }
.c3d-stage-code .tok-var { color: #F4FDAF; }
.c3d-stage-code .tok-num { color: #F78C6C; }
.c3d-stage-code .stage-n {
  display: inline-block;
  min-width: 1.3ch;
  padding: 0 6px;
  background: rgba(239, 221, 141, 0.16);
  border: 1px solid rgba(239, 221, 141, 0.45);
  border-radius: 5px;
  color: var(--accent);
  text-align: center;
  transition: background .25s ease, transform .25s ease;
}
.c3d-stage-code .stage-n.is-bump { transform: scale(1.18); background: rgba(239, 221, 141, 0.32); }
.c3d-stage-output {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(16px, 1.9vw, 20px);
  color: var(--text-2);
  min-height: 96px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.c3d-stage-output .out-row {
  opacity: 0;
  transform: translateX(-10px);
  color: var(--accent-soft);
  transition: opacity .28s ease-out, transform .28s ease-out;
}
.c3d-stage-output .out-row.is-shown {
  opacity: 1;
  transform: translateX(0);
}
.c3d-stage-output .out-row.is-empty {
  color: var(--text-3);
  font-style: italic;
  font-family: 'Instrument Serif', serif;
  font-size: 18px;
}
.c3d-stage-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--text-3);
  text-transform: uppercase;
  text-align: center;
  opacity: 0.7;
}

/* In stage mode: hide magazine-spread phrases (caption lives on stage) */
body.layout-stage .c3d-phrases { display: none; }

/* ─── Overlay: single column ──────────────────────────────────── */
.c3d-overlay {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  display: grid;
  grid-template-columns: 1fr;
  grid-template-rows: auto 1fr auto;
  gap: 0;
  padding: 24px;
}
.c3d-overlay > * { pointer-events: auto; }

/* ─── Top: act wayfinding bar + progress dots ──────────────────── */
.c3d-top {
  grid-column: 1;
  grid-row: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  pointer-events: none;
}
.c3d-actbar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  pointer-events: none;
}
.c3d-actbar .step {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 5px 10px;
  border: 1px solid rgba(101, 116, 58, 0.32);
  border-radius: 999px;
  background: rgba(42, 9, 48, 0.45);
  backdrop-filter: blur(6px);
  transition: color .35s ease, border-color .35s ease, background .35s ease, transform .35s ease;
}
.c3d-actbar .step.is-active {
  color: var(--accent);
  border-color: rgba(239, 221, 141, 0.55);
  background: rgba(239, 221, 141, 0.08);
  transform: scale(1.04);
  box-shadow: 0 0 24px rgba(239, 221, 141, 0.16);
}
.c3d-actbar .step.is-done {
  color: var(--text-2);
  border-color: rgba(201, 184, 106, 0.32);
}
.c3d-actbar .sep {
  width: 18px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--line, #65743A), transparent);
}
.c3d-progress {
  display: flex;
  gap: 8px;
  pointer-events: none;
}
.c3d-progress .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(101, 116, 58, 0.32);
  transition: background .3s ease, transform .3s ease;
}
.c3d-progress .dot.is-active { background: var(--accent); transform: scale(1.3); }
.c3d-progress .dot.is-done { background: var(--accent-deep); }

/* ─── Magazine spread phrase anchors ─────────────────────────────── */
.c3d-phrases {
  grid-column: 1;
  grid-row: 2;
  position: relative;
  pointer-events: none;
}
.c3d-phrase {
  position: absolute;
  font-family: 'Instrument Serif', Georgia, serif;
  font-style: italic;
  font-weight: 400;
  color: var(--text-2);
  letter-spacing: -.01em;
  line-height: 1.05;
  opacity: 0;
  white-space: nowrap;
  max-width: 92vw;
  filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.4));
  pointer-events: none;
  transform-origin: center;
}
.c3d-phrase em { color: var(--accent-soft); font-style: italic; }
.c3d-phrase.is-active {
  color: var(--accent-soft);
  text-shadow: 0 0 24px rgba(239, 221, 141, 0.18);
}
.c3d-phrase.is-active::after {
  content: '';
  position: absolute;
  left: 6%; right: 6%;
  bottom: -10px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  border-radius: 2px;
  filter: drop-shadow(0 0 6px rgba(239, 221, 141, 0.6));
}
.c3d-phrase.is-dim { color: var(--text-3); opacity: .42 !important; }

/* Anchor positions — used by Cascade variant */
.c3d-phrase[data-anchor="tl"] { top: 4%;    left: 4%;   transform-origin: top left; }
.c3d-phrase[data-anchor="t"]  { top: 6%;    left: 42%;  transform: translateX(-50%); }
.c3d-phrase[data-anchor="c"]  { top: 78%;   left: 42%;  transform: translate(-50%, -50%); text-align: center; }
.c3d-phrase[data-anchor="br"] { bottom: 6%; right: 4%;  transform-origin: bottom right; text-align: right; }
.c3d-phrase[data-anchor="bl"] { bottom: 10%; left: 4%; }
.c3d-phrase[data-anchor="r"]  { top: 50%;   right: 4%;  transform: translateY(-50%); text-align: right; }

/* Per-size variants */
.c3d-phrase.size-xxl { font-size: clamp(80px, 11vw, 180px); }
.c3d-phrase.size-xl { font-size: clamp(56px, 8vw, 120px); }
.c3d-phrase.size-l  { font-size: clamp(36px, 5vw, 72px); }
.c3d-phrase.size-m  { font-size: clamp(24px, 3.4vw, 44px); }
.c3d-phrase.size-s  { font-size: clamp(18px, 2.2vw, 28px); }

/* ─── Spread variants ───────────────────────────────────────────── */
/* Variant B — Karaoke: phrases stack vertically near the TOP, well clear
   of the centred orb. Last one bright, previous ones dim further. */
.c3d-phrases.variant-karaoke .c3d-phrase {
  position: relative;
  display: block;
  text-align: center;
  margin: 6px auto;
  left: auto; right: auto; top: auto; bottom: auto;
  transform: none !important;
  white-space: normal;
  max-width: 70vw;
}
.c3d-phrases.variant-karaoke {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  padding-top: 12px;
}
.c3d-phrases.variant-karaoke .c3d-phrase.size-l  { font-size: clamp(28px, 4vw, 48px); }
.c3d-phrases.variant-karaoke .c3d-phrase.size-m  { font-size: clamp(20px, 2.6vw, 32px); }
.c3d-phrases.variant-karaoke .c3d-phrase.is-dim { opacity: 0.28 !important; transform: scale(0.85) !important; }
.c3d-phrases.variant-karaoke .c3d-phrase.is-active::after { display: none; }

/* Variant C — Orbital: phrases around the orb at 4 cardinal points. */
.c3d-phrases.variant-orbital .c3d-phrase[data-anchor="tl"],
.c3d-phrases.variant-orbital .c3d-phrase[data-anchor="t"]  { top: 12%; left: 50%; transform: translateX(-50%); text-align: center; }
.c3d-phrases.variant-orbital .c3d-phrase[data-anchor="r"],
.c3d-phrases.variant-orbital .c3d-phrase[data-anchor="br"] { top: 50%; right: 6%; left: auto; bottom: auto; transform: translateY(-50%); text-align: right; }
.c3d-phrases.variant-orbital .c3d-phrase[data-anchor="bl"],
.c3d-phrases.variant-orbital .c3d-phrase[data-anchor="c"]  { bottom: 12%; left: 50%; top: auto; right: auto; transform: translateX(-50%); text-align: center; }
.c3d-phrases.variant-orbital .c3d-phrase[data-anchor="l"]  { top: 50%; left: 6%; right: auto; transform: translateY(-50%); text-align: left; }
.c3d-phrases.variant-orbital .c3d-phrase { white-space: nowrap; }

/* Variant D — Spotlight: latest phrase huge + ~30% from top (clear of
   the orb), older ones shrink to tiny ghosts in the top-left corner. */
.c3d-phrases.variant-spotlight .c3d-phrase {
  top: 26%; left: 50%; right: auto; bottom: auto;
  transform: translate(-50%, -50%);
  text-align: center;
  white-space: normal;
  max-width: 80vw;
}
.c3d-phrases.variant-spotlight .c3d-phrase.is-dim {
  opacity: 0.22 !important;
  transform: translate(-50%, -50%) scale(0.35) !important;
  top: 14%; left: 10%;
}
.c3d-phrases.variant-spotlight .c3d-phrase.is-active::after { display: none; }

/* ─── Center: wayfinding arrow ─────────────────────────────────── */
.c3d-pointer {
  position: fixed;
  z-index: 6;
  pointer-events: none;
  font-family: 'Instrument Serif', Georgia, serif;
  font-style: italic;
  font-size: 22px;
  color: var(--accent);
  opacity: 0;
  filter: drop-shadow(0 0 12px rgba(239, 221, 141, 0.55));
}

/* ─── Bottom: cards/quiz mini area ─────────────────────────────── */
.c3d-task {
  grid-column: 1;
  grid-row: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding-top: 18px;
  min-height: 0;
}
.c3d-task .prompt {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(20px, 2.4vw, 28px);
  color: var(--text);
  opacity: 0;
  text-align: center;
}
.c3d-task .prompt code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85em;
  color: var(--accent);
  background: rgba(239, 221, 141, 0.08);
  padding: 2px 8px;
  border-radius: 6px;
}
.c3d-cards {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.c3d-card {
  width: 54px;
  height: 72px;
  border-radius: 10px;
  background: linear-gradient(160deg, rgba(52, 15, 60, 0.85), rgba(33, 1, 36, 0.85));
  border: 1px solid rgba(239, 221, 141, 0.25);
  color: var(--accent-soft);
  font-family: 'Instrument Serif', serif;
  font-size: 30px;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  opacity: 0;
  transform: translateY(20px) scale(.9);
}
.c3d-card:hover {
  transform: translateY(-4px) scale(1.05);
  box-shadow: 0 12px 32px rgba(239, 221, 141, 0.2);
  border-color: var(--accent);
}
.c3d-card.is-correct {
  background: linear-gradient(160deg, rgba(101, 116, 58, 0.4), rgba(239, 221, 141, 0.18));
  border-color: var(--accent);
  pointer-events: none;
  animation: cardCorrect .4s ease;
}
.c3d-card.is-wrong {
  border-color: #d34;
  animation: cardWrong .35s ease;
}
.c3d-card.is-flying {
  pointer-events: none;
}
@keyframes cardCorrect {
  0%   { transform: translateY(-4px) scale(1.05); }
  40%  { transform: translateY(-10px) scale(1.15); box-shadow: 0 16px 40px rgba(239, 221, 141, 0.5); }
  100% { transform: translateY(-4px) scale(1.05); }
}
@keyframes cardWrong {
  0%, 100% { transform: translateY(-4px) scale(1.05); }
  25%      { transform: translateY(-4px) translateX(-6px) scale(1.05); }
  75%      { transform: translateY(-4px) translateX(6px) scale(1.05); }
}

/* ─── Practica answer cards (wide rectangular code answers) ──────── */
.c3d-answers {
  display: flex;
  gap: 10px;
  flex-direction: column;
  align-items: stretch;
  width: min(560px, 88vw);
}
.c3d-answer {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(15px, 1.9vw, 18px);
  color: var(--text);
  background: rgba(42, 9, 48, 0.65);
  border: 1px solid rgba(239, 221, 141, 0.22);
  border-radius: 10px;
  padding: 12px 16px;
  cursor: pointer;
  text-align: left;
  opacity: 0;
  transform: translateY(14px);
  transition: transform .2s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease;
}
.c3d-answer:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  background: rgba(239, 221, 141, 0.08);
}
.c3d-answer.is-correct {
  background: linear-gradient(160deg, rgba(101, 116, 58, 0.4), rgba(239, 221, 141, 0.18));
  border-color: var(--accent);
  box-shadow: 0 0 24px rgba(239, 221, 141, 0.32);
  pointer-events: none;
}
.c3d-answer.is-wrong {
  border-color: #d34;
  animation: cardWrong .35s ease;
}
.c3d-answer.is-disabled { pointer-events: none; opacity: 0.55; }

/* ─── Score star bar ───────────────────────────────────────────── */
.c3d-score {
  display: flex;
  gap: 14px;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-3);
  text-transform: uppercase;
  margin: 4px 0 8px;
  opacity: 0;
}
.c3d-score .stars { display: flex; gap: 6px; }
.c3d-score .star {
  font-family: 'Instrument Serif', serif;
  font-size: 22px;
  line-height: 1;
  color: rgba(101, 116, 58, 0.4);
  transition: color .35s ease, text-shadow .35s ease, transform .35s ease;
}
.c3d-score .star.is-full { color: var(--accent); text-shadow: 0 0 12px rgba(239, 221, 141, 0.5); }
.c3d-score .star.is-half {
  background: linear-gradient(90deg, var(--accent) 50%, rgba(101, 116, 58, 0.4) 50%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

/* ─── Pre-Practica flash deck (Pokémon-Go style) ───────────────── */
.c3d-flash {
  position: fixed;
  inset: 0;
  z-index: 8;
  display: grid;
  place-items: center;
  background: radial-gradient(ellipse at center, rgba(42, 9, 48, 0.92), rgba(20, 0, 22, 0.96));
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity .35s ease, visibility .35s;
}
.c3d-flash.is-open { opacity: 1; visibility: visible; pointer-events: auto; }
.c3d-flash-frame {
  position: relative;
  width: min(440px, 86vw);
  height: min(560px, 78vh);
  display: grid;
  place-items: center;
}
.c3d-flash-card {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, rgba(60, 18, 70, 0.95), rgba(33, 1, 36, 0.98));
  border: 1px solid rgba(239, 221, 141, 0.32);
  border-radius: 22px;
  padding: 32px 28px;
  box-shadow: 0 36px 80px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(239, 221, 141, 0.04) inset;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  text-align: center;
  cursor: grab;
  opacity: 0;
  transform: translateY(40px) scale(0.92);
  transition: transform .25s ease;
  touch-action: pan-y;
  user-select: none;
}
.c3d-flash-card.is-active {
  opacity: 1;
  transform: translateY(0) scale(1);
  z-index: 3;
}
.c3d-flash-card.is-next {
  opacity: 0.55;
  transform: translateY(14px) scale(0.96);
  z-index: 2;
}
.c3d-flash-card.is-buried {
  opacity: 0.3;
  transform: translateY(24px) scale(0.93);
  z-index: 1;
}
.c3d-flash-card.is-flown {
  pointer-events: none;
  z-index: 4;
}
.c3d-flash-card .tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent-deep);
}
.c3d-flash-card .title {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: clamp(28px, 5vw, 42px);
  color: var(--accent-soft);
  line-height: 1.15;
}
.c3d-flash-card .title em { color: var(--accent); }
.c3d-flash-card .body {
  font-family: 'Inter', sans-serif;
  font-size: clamp(14px, 1.9vw, 17px);
  color: var(--text-2);
  line-height: 1.5;
  max-width: 320px;
}
.c3d-flash-card .body code {
  font-family: 'JetBrains Mono', monospace;
  background: rgba(239, 221, 141, 0.08);
  color: var(--accent);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.9em;
}
.c3d-flash-card .hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-3);
}
.c3d-flash-progress {
  position: absolute;
  top: -32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
}
.c3d-flash-progress .pip {
  width: 26px; height: 3px;

<!-- GSAP (same version as index.html) -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
/* ===========================================================================
   CINEMA DEMO — Magazine spread + GSAP (no 3D)
   ─────────────────────────────────────────────────────────────────────────
   Stack:
     • GSAP        — phrase entries, ui state
     • Vanilla DOM — magazine-spread overlay (no React, no Three.js)
     • Wispucci .orb (SVG/CSS, design system) as the centred character
   Theme: Python Loops / for i in range(N): print(i)
   Acts:
     1. Află       — intro magazine spread (Cascade)
     2. Tu         — interactive: tap N, watch range(N)
     3. Aha        — reflective spread (Cascade) + +XP overlay
     4. Mai mult   — 3-example auto-walkthrough (Orbital spread)
     5. Practică   — Pokémon-Go flash deck → 4 MC questions (Karaoke spread)
        → Finale (Spotlight) keyed to score
=========================================================================== */

const $ = (id) => document.getElementById(id);
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

// ─────────────────────────────────────────────────────────────────────
// 1.  Orb host references + state CSS toggle
// ─────────────────────────────────────────────────────────────────────
const orbHost = $('orbHost');
const theOrb  = $('theOrb');

function setOrbState(state) {
  ['is-thinking', 'is-speaking', 'is-listening', 'is-celebrating'].forEach((c) => theOrb.classList.remove(c));
  theOrb.classList.add('is-' + state);
}
setOrbState('thinking');

const ORB_EMOTIONS = {
  neutral:     { mouth: 'M 40 65 Q 50 67 60 65',  mouthW: 3,   eyeRy: 5.4, cheekR: 3 },
  confused:    { mouth: 'M 42 66 Q 50 63 58 66',  mouthW: 3,   eyeRy: 3.2, cheekR: 3 },
  counting:    { mouth: 'M 42 64 Q 50 71 58 64',  mouthW: 3.4, eyeRy: 5.4, cheekR: 3.6 },
  wow:         { mouth: 'M 36 62 Q 50 80 64 62',  mouthW: 4,   eyeRy: 6.6, cheekR: 5.5 },
  celebrating: { mouth: 'M 34 60 Q 50 84 66 60',  mouthW: 4.2, eyeRy: 6.8, cheekR: 6 }
};
function setOrbEmotion(emotion) {
  ['is-confused', 'is-counting', 'is-wow', 'is-celebrating'].forEach((c) => theOrb.classList.remove(c));
  if (emotion && emotion !== 'neutral') theOrb.classList.add('is-' + emotion);
  const cfg = ORB_EMOTIONS[emotion] || ORB_EMOTIONS.neutral;
  const mouth = theOrb.querySelector('.mouth');
  if (mouth) {
    mouth.setAttribute('d', cfg.mouth);
    mouth.setAttribute('stroke-width', cfg.mouthW);
  }
  theOrb.querySelectorAll('.face-eyes .eye').forEach((e) => e.setAttribute('ry', cfg.eyeRy));
  theOrb.querySelectorAll('.cheek').forEach((c) => c.setAttribute('r', cfg.cheekR));
}

// ─────────────────────────────────────────────────────────────────────
// 2.  Layout mode (spread = magazine, stage = focused code panel)
// ─────────────────────────────────────────────────────────────────────
function setLayoutMode(mode) {
  document.body.classList.toggle('layout-stage',  mode === 'stage');
  document.body.classList.toggle('layout-spread', mode === 'spread');
}
setLayoutMode('spread');

// ─────────────────────────────────────────────────────────────────────
// 3.  Audio feedback ticks (tiny, optional, web-audio synthesised)
// ─────────────────────────────────────────────────────────────────────
let audioCtx = null;
function tone(freq, dur = 0.08, type = 'sine', gain = 0.04) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(t);
    o.stop(t + dur + 0.02);
  } catch (_) { /* audio is optional */ }
}
function clickTick()  { tone(880, 0.06, 'sine', 0.03); }
function rightTick()  { tone(660, 0.07, 'triangle', 0.05); setTimeout(() => tone(990, 0.09, 'triangle', 0.05), 70); }
function wrongTick()  { tone(220, 0.16, 'sawtooth', 0.04); }
function starTick()   { tone(1320, 0.12, 'triangle', 0.06); }

// ─────────────────────────────────────────────────────────────────────
// 4.  Magazine-spread phrase system (variant-aware).
// ─────────────────────────────────────────────────────────────────────
const phrasesHost = $('phrases');
const livePhrases = [];

function setSpreadVariant(name) {
  // name ∈ 'cascade' | 'karaoke' | 'orbital' | 'spotlight'
  phrasesHost.classList.remove('variant-cascade', 'variant-karaoke', 'variant-orbital', 'variant-spotlight');
  phrasesHost.classList.add('variant-' + name);
  phrasesHost.dataset.variant = name;
}

function currentVariant() { return phrasesHost.dataset.variant || 'cascade'; }

function addPhrase({ html, anchor = 'c', size = 'l', tilt = 0, hold = 0 }) {
  // Dim older phrases. Only the freshest stays `is-active`.
  livePhrases.forEach((p) => {
    p.el.classList.add('is-dim');
    p.el.classList.remove('is-active');
  });

  const el = document.createElement('div');
  el.className = `c3d-phrase size-${size} is-active`;
  el.dataset.anchor = anchor;
  el.innerHTML = html;
  phrasesHost.appendChild(el);

  const variant = currentVariant();
  let from = { opacity: 0, scale: 0.92, duration: 0.7, ease: 'expo.out' };

  if (variant === 'cascade') {
    const entryFrom = {
      tl: { x: -120, y: -60, rotate: -8 },
      t:  { x: 0,    y: -80, rotate: 0 },
      c:  { x: 0,    y: 30,  rotate: 0 },
      br: { x: 120,  y: 80,  rotate: 6 },
      bl: { x: -120, y: 80,  rotate: -6 },
      r:  { x: 120,  y: 0,   rotate: 4 }
    }[anchor] || { x: 0, y: 30, rotate: 0 };
    gsap.fromTo(el,
      { opacity: 0, x: entryFrom.x, y: entryFrom.y, rotate: entryFrom.rotate + tilt, scale: 0.92 },
      { opacity: 1, x: 0, y: 0, rotate: tilt, scale: 1, duration: 0.7, ease: 'expo.out' }
    );
  } else if (variant === 'karaoke') {
    gsap.fromTo(el,
      { opacity: 0, y: 60, scale: 0.85 },
      { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: 'expo.out' }
    );
    // Tighten dim items further so latest pops.
    livePhrases.forEach((p) => {
      if (p.el === el) return;
      gsap.to(p.el, { scale: 0.78, opacity: 0.25, duration: 0.35, ease: 'power2.out' });
    });
  } else if (variant === 'orbital') {
    const cardinal = {
      tl: { from: { x: 0, y: -120, rotate: -8 }, to: { rotate: 0 } },
      t:  { from: { x: 0, y: -120, rotate: 0 },  to: { rotate: 0 } },
      r:  { from: { x: 160, y: 0, rotate: 6 },   to: { rotate: 0 } },
      br: { from: { x: 160, y: 0, rotate: 6 },   to: { rotate: 0 } },
      c:  { from: { x: 0, y: 120, rotate: 0 },   to: { rotate: 0 } },
      bl: { from: { x: -160, y: 0, rotate: -6 }, to: { rotate: 0 } },
      l:  { from: { x: -160, y: 0, rotate: -6 }, to: { rotate: 0 } }
    }[anchor] || { from: { x: 0, y: 80, rotate: 0 }, to: { rotate: 0 } };
    gsap.fromTo(el,
      { opacity: 0, x: cardinal.from.x, y: cardinal.from.y, rotate: cardinal.from.rotate, scale: 0.6 },
      { opacity: 1, x: 0, y: 0, rotate: tilt, scale: 1, duration: 0.65, ease: 'back.out(1.4)' }
    );
    // Micro orb rotation toward the phrase — apply to the inner .orb, NOT
    // orbHost (orbHost's transform is owned by body.layout-* CSS rules).
    const rot = { tl: -6, t: 0, r: 8, br: 6, c: 0, bl: -6, l: -8 }[anchor] ?? 0;
    gsap.to(theOrb, { rotation: rot, duration: 0.5, ease: 'power2.out', overwrite: 'auto' });
    setTimeout(() => gsap.to(theOrb, { rotation: 0, duration: 0.6, ease: 'power2.inOut' }), 900);
  } else if (variant === 'spotlight') {
    gsap.fromTo(el,
      { opacity: 0, scale: 0.4, filter: 'blur(8px)' },
      { opacity: 1, scale: 1, filter: 'blur(0px)', duration: 0.6, ease: 'expo.out' }
    );
  }

  const handle = { el, anchor, hold };
  livePhrases.push(handle);
  return handle;
}

function clearPhrases() {
  const els = livePhrases.map((p) => p.el);
  livePhrases.length = 0;
  if (!els.length) return Promise.resolve();
  return new Promise((resolve) => {
    gsap.to(els, {
      opacity: 0,
      scale: 0.6,
      y: '+=20',
      stagger: 0.05,
      duration: 0.4,
      ease: 'power2.in',
      onComplete: () => {
        els.forEach((el) => el.remove());
        resolve();
      }
    });
  });
}

async function emitPrintRows(values, delay = 320) {

    row.className = 'out-row';
    row.textContent = '> ' + v;
    stageOutput.appendChild(row);

  const myToken = ++iterToken;

  const nEl = document.getElementById('stageN');
  if (nEl) { nEl.textContent = n; nEl.classList.add('is-bump'); setTimeout(() => nEl.classList.remove('is-bump'), 280); }
  clearStageOutput();

  if (n === 0) {

    empty.className = 'out-row is-empty';
    empty.textContent = '(nimic — range(0) e gol)';

    void empty.offsetWidth;
    empty.classList.add('is-shown');
    await sleep(1100);
    if (iterToken !== myToken) return;
    setOrbEmotion('neutral');
    return;
  }

  setOrbEmotion('counting');
  for (let i = 0; i < n; i++) {
    if (iterToken !== myToken) return;
    const row = document.createElement('div');
    row.className = 'out-row';

  if (n >= 5)      setOrbEmotion('wow');

function buildFlashDeck() {
  // Clear previous cards (keep pips host intact).
  flashFrame.querySelectorAll('.c3d-flash-card').forEach((c) => c.remove());
  flashPips.innerHTML = '';
  flashCards = FLASH_CARDS.map((c, i) => {

function syncFlashStack() {
  flashCards.forEach((el, i) => {
    el.classList.remove('is-active', 'is-next', 'is-buried', 'is-flown');
    if (i < flashIdx) {
      el.classList.add('is-flown');
      el.style.transform = 'translate(-160%, -20%) rotate(-12deg)';
      el.style.opacity = '0';
    } else if (i === flashIdx) {
      el.classList.add('is-active');
      el.style.transform = '';
      el.style.opacity = '';
    } else if (i === flashIdx + 1) {
      el.classList.add('is-next');
      el.style.transform = '';
      el.style.opacity = '';
    } else {
      el.classList.add('is-buried');
      el.style.transform = '';
      el.style.opacity = '';
    }
  });
  Array.from(flashPips.children).forEach((p, i) => {
    p.classList.toggle('is-active', i === flashIdx);
    p.classList.toggle('is-done',   i <  flashIdx);
  });
  flashNextBtn.textContent = (flashIdx >= flashCards.length - 1) ? 'start practică →' : 'următor →';
}

function flyFlashCard(dir = 1) {
  const el = flashCards[flashIdx];
  if (!el) return;
  el.classList.add('is-flown');
  gsap.to(el, {
    x: dir * 360,
    y: -40,
    rotation: dir * 14,
    opacity: 0,
    duration: 0.4,
    ease: 'power2.in',
    onComplete: () => {
      flashIdx++;
      if (flashIdx >= flashCards.length) {
        closeFlashDeck();
        flashResolver && flashResolver('done');
      } else {
        syncFlashStack();
      }
    }
  });
  clickTick();
}

let flashResolver = null;
let flashDragState = null;
function openFlashDeck() {
  return new Promise((resolve) => {
    flashResolver = resolve;
    buildFlashDeck();
    flashDeck.classList.add('is-open');
    gsap.fromTo(flashCards[0],
      { opacity: 0, y: 60, scale: 0.85 },

    );
    document.addEventListener('keydown', flashKeyHandler);
    flashCards.forEach((el) => attachFlashDrag(el));
  });
}
function closeFlashDeck() {
  flashDeck.classList.remove('is-open');
  document.removeEventListener('keydown', flashKeyHandler);
}
function flashKeyHandler(e) {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    flyFlashCard(1);
  } else if (e.key === 'Escape') {
    closeFlashDeck();
    flashResolver && flashResolver('skip');
  }
}

function attachFlashDrag(el) {
  const onDown = (e) => {
    if (!el.classList.contains('is-active')) return;
    const pt = (e.touches ? e.touches[0] : e);
    flashDragState = { startX: pt.clientX, startY: pt.clientY, dx: 0, dy: 0, el };
    el.style.cursor = 'grabbing';
    e.preventDefault();
  };
  const onMove = (e) => {
    if (!flashDragState || flashDragState.el !== el) return;
    const pt = (e.touches ? e.touches[0] : e);
    flashDragState.dx = pt.clientX - flashDragState.startX;
    flashDragState.dy = pt.clientY - flashDragState.startY;
    const rot = flashDragState.dx * 0.05;
    el.style.transform = `translate(${flashDragState.dx}px, ${flashDragState.dy * 0.4}px) rotate(${rot}deg)`;
  };
  const onUp = () => {
    if (!flashDragState || flashDragState.el !== el) return;
    el.style.cursor = '';
    const dx = flashDragState.dx;
    flashDragState = null;
    if (Math.abs(dx) > 80) {
      flyFlashCard(dx > 0 ? 1 : -1);
    } else {
      gsap.to(el, { x: 0, y: 0, rotation: 0, duration: 0.3, ease: 'power2.out',
        onComplete: () => { el.style.transform = ''; } });
    }
  };
  el.addEventListener('mousedown', onDown);
  el.addEventListener('touchstart', onDown, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchend', onUp);
}

// Minimal Python syntax highlighter for the Practica question code blocks.
// Wraps `for`, `in`, `range`, `print`, and numeric literals in the same
// tok-* spans used by the Act 2 / Act 4 stage code.
function pyHighlight(src) {
  const esc = src
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  return esc
    .replace(/\b(for|in)\b/g, '<span class="tok-kw">$1</span>')
    .replace(/\b(range|print)\b/g, '<span class="tok-fn">$1</span>')
    .replace(/\b(\d+)\b/g, '<span class="tok-num">$1</span>')
    .replace(/\n/g, '<br>')
    .replace(/    /g, '&nbsp;&nbsp;&nbsp;&nbsp;');
}

// Animate the correct answer into stageOutput, one row at a time (like Act 2).
async function spellAnswerInOutput(answerStr) {
  clearStageOutput();
  const isEmpty = /^nimic/i.test(answerStr.trim());
  if (isEmpty) {
    const row = document.createElement('div');
    row.className = 'out-row is-empty';
    row.textContent = '(nimic — buclă goală)';
    stageOutput.appendChild(row);
    void row.offsetWidth;
    row.classList.add('is-shown');
    await sleep(700);
    return;
  }
  const items = answerStr.split(/,\s*/).filter(Boolean);
  for (const v of items) {
    const row = document.createElement('div');
    row.className = 'out-row';
    row.textContent = '> ' + v;
    stageOutput.appendChild(row);
    void row.offsetWidth;
    row.classList.add('is-shown');
    gsap.fromTo(theOrb, { scale: 1 }, { scale: 1.04, duration: 0.1, yoyo: true, repeat: 1, ease: 'sine.inOut' });
    await sleep(240);
  }
}

async function askPracticaQuestion(idx) {
  const q = PRACTICA[idx];
  cardsGrid.innerHTML = '';
  answersGrid.innerHTML = '';
  taskPrompt.innerHTML = '';

  // Stage caption: question + number tag
  setStageCaption(
    `<span style="display:block;font-family:'JetBrains Mono',monospace;font-size:0.45em;letter-spacing:0.25em;color:var(--accent-soft);opacity:0.65;margin-bottom:6px;text-transform:uppercase">Întrebarea ${idx + 1} / ${PRACTICA.length}</span>${q.prompt}`
  );
  // Stage code: the question's Python snippet, syntax-highlighted
  setStageCodeHTML(pyHighlight(q.code));
  clearStageOutput();
  stageHint.textContent = '↓ alege răspunsul';
  gsap.fromTo(stageHint, { opacity: 0 }, { opacity: 0.7, duration: 0.4, delay: 0.25 });

  let attempts = 0;
  return new Promise((resolve) => {
    const answerEls = q.answers.map((a, i) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'c3d-answer';
      b.textContent = a;
      answersGrid.appendChild(b);
      b.addEventListener('click', async () => {
        if (b.classList.contains('is-disabled') || b.classList.contains('is-correct') || b.classList.contains('is-flying')) return;
        attempts++;
        if (i === q.correct) {
          b.classList.add('is-correct');
          rightTick();
          setOrbEmotion('wow');
          setOrbState('celebrating');
          stageHint.textContent = '↑ exact!';
          await spellAnswerInOutput(a);
          updateScoreBar(idx, attempts === 1 ? 'full' : 'half');
          await sleep(700);
          resolve({ correct: true, attempts });
        } else {
          b.classList.add('is-wrong', 'is-disabled');
          wrongTick();
          setOrbEmotion('confused');
          if (attempts === 1) {
            setStageCaption(`<em>Atenție:</em> ${q.hint}`);
            stageHint.textContent = '↓ mai încearcă';
          } else {
            // Second wrong → reveal correct + spell it + half-star credit.
            answerEls[q.correct].classList.add('is-correct');
            setStageCaption(`Răspuns: <em>${q.answers[q.correct]}</em>. ${q.hint}`);
            stageHint.textContent = '↑ ține minte';
            updateScoreBar(idx, 'half');
            await spellAnswerInOutput(q.answers[q.correct]);
            await sleep(1100);
            resolve({ correct: false, attempts, revealed: true });
          }
        }
      });
      return b;
    });

    gsap.fromTo(answerEls,
      { opacity: 0, y: 14 },
      { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out', stagger: 0.07, delay: 0.2 }
    );
  });
}

async function runPractica() {
  setLayoutMode('stage');
  setAct(5);
  setOrbState('listening');
  setOrbEmotion('neutral');
  await clearPhrases();
  renderScoreBar();
  await sleep(300);

  for (let i = 0; i < PRACTICA.length; i++) {
    await askPracticaQuestion(i);
    await sleep(420);
    // Fade answer buttons out before rendering next question. AWAIT the
    // clear or the next question's fresh buttons get wiped by stale
    // onComplete callbacks.
    await new Promise((resolve) => {
      const kids = Array.from(answersGrid.children);
      if (!kids.length) { answersGrid.innerHTML = ''; setTimeout(resolve, 200); return; }
      gsap.to(kids, {
        opacity: 0, y: -10, duration: 0.25, stagger: 0.04,
        onComplete: () => { answersGrid.innerHTML = ''; resolve(); }
      });
    });
    await sleep(120);
  }

  await sleep(300);
  await showFinale(fullStarsCount());
}

// ─────────────────────────────────────────────────────────────────────
// 12. Finale overlay (score-driven).
// ─────────────────────────────────────────────────────────────────────
const finaleOverlay = $('finaleOverlay');
const finaleTitle = $('finaleTitle');
const finaleLbl   = $('finaleLbl');
const finaleBody  = $('finaleBody');
const finaleAgain = $('finaleAgain');
const finaleClose = $('finaleClose');

function showFinale(stars) {
  return new Promise((resolve) => {
    let title, lbl, body, useSpotlight = false;
    if (stars >= 4) {
      title = 'Maestru.';
      lbl = `scor · ${stars}/${STARS_OUT_OF}`;
      body = 'Ai înțeles <em>range</em>. Acum știi loops.';
      useSpotlight = true;
    } else if (stars === 3) {
      title = 'Bun.';
      lbl = `scor · ${stars}/${STARS_OUT_OF}`;
      body = 'Aproape perfect. Mai uite o dată regulile dacă vrei.';
    } else {
      title = 'Încă o dată.';
      lbl = `scor · ${stars}/${STARS_OUT_OF}`;
      body = 'Recap 20s &mdash; după, încearcă din nou.';
    }

    finaleTitle.innerHTML = title;
    finaleLbl.textContent = lbl;
    finaleBody.innerHTML = body;
    finaleOverlay.classList.add('is-open');
    setOrbState(stars >= 3 ? 'celebrating' : 'thinking');
    setOrbEmotion(stars >= 3 ? 'celebrating' : 'neutral');

    gsap.fromTo(finaleTitle, { scale: 0.5, y: 20 }, { scale: 1, y: 0, duration: 0.7, ease: 'elastic.out(1, 0.6)' });
    gsap.fromTo(finaleBody, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out', delay: 0.2 });

    if (useSpotlight) {
      // Spotlight spread under the overlay so when user closes, lesson world is mid-spotlight.
      setSpreadVariant('spotlight');
      clearPhrases().then(() => {
        addPhrase({ html: '<em>MAESTRU.</em>', anchor: 'c', size: 'xxl' });
      });
    } else if (stars <= 2) {
      // Compressed 20s recap (Spotlight terms).
      setSpreadVariant('spotlight');
      clearPhrases().then(async () => {
        const recap = [
          { html: '<em>range</em>', delay: 1800 },
          { html: '<em>0</em>-indexed', delay: 1800 },
          { html: '<em>stop</em> = exclusiv', delay: 1800 },
          { html: '<em>step</em>', delay: 1800 },
          { html: 'încearcă <em>din nou</em>', delay: 1800 }
        ];
        for (const r of recap) {
          addPhrase({ html: r.html, anchor: 'c', size: 'xl' });
          await sleep(r.delay);
        }
      });
    }

    const onAgain = () => {
      finaleOverlay.classList.remove('is-open');
      finaleAgain.removeEventListener('click', onAgain);
      finaleClose.removeEventListener('click', onClose);
      resolve('again');
    };
    const onClose = () => {
      finaleOverlay.classList.remove('is-open');
      finaleAgain.removeEventListener('click', onAgain);
      finaleClose.removeEventListener('click', onClose);
      resolve('close');
    };
    finaleAgain.addEventListener('click', onAgain);
    finaleClose.addEventListener('click', onClose);
  });
}

// ─────────────────────────────────────────────────────────────────────
// 13. Glossary footer popover (post-lesson only).
// ─────────────────────────────────────────────────────────────────────
const glossBtn = $('glossBtn');
const glossPop = $('glossPop');
const glossList = $('glossList');
const GLOSS = [
  ['range(N)',      'numere de la <em>0</em> la <em>N-1</em>'],
  ['range(a, b)',   'de la a (inclus) la b (exclus)'],
  ['range(a, b, k)','cu pas k (step)'],
  ['for i in …',    'repetă codul pentru fiecare valoare'],
  ['0-indexed',     'Python pornește numărătoarea de la 0']
];
function buildGloss() {
  glossList.innerHTML = '';
  for (const [t, d] of GLOSS) {
    const li = document.createElement('li');
    li.innerHTML = `<b>${t}</b> ${d}`;
    glossList.appendChild(li);
  }
}
buildGloss();
function showGlossButton() { glossBtn.classList.add('is-shown'); }
function hideGlossButton() { glossBtn.classList.remove('is-shown'); glossPop.classList.remove('is-open'); }
glossBtn.addEventListener('click', () => {
  glossPop.classList.toggle('is-open');
});
document.addEventListener('click', (e) => {
  if (!glossPop.classList.contains('is-open')) return;
  if (e.target === glossBtn || glossPop.contains(e.target)) return;
  glossPop.classList.remove('is-open');
});

// ─────────────────────────────────────────────────────────────────────
// 14. Main flow — Python "Loops" lesson, 5 acts.
// ─────────────────────────────────────────────────────────────────────
let flowGen = 0;
function stopActiveFlow() { flowGen++; iterToken++; mostreSkipFlag = true; }

async function runLoopsFlow() {
  const myGen = ++flowGen;
  const alive = () => myGen === flowGen;
  resetAll();

  // ── Act 1 — Află (Cascade spread) ────────────────────────────────
  setLayoutMode('spread');
  setSpreadVariant('cascade');
  setAct(1);
  setOrbState('thinking');
  setOrbEmotion('neutral');
  await sleep(700); if (!alive()) return;

  setOrbState('speaking');
  addPhrase({ html: '<em>Loops</em>?',          anchor: 'tl', size: 'xl', tilt: -3 });
  await sleep(1100); if (!alive()) return;
  addPhrase({ html: 'Tema mea<br><em>preferată</em>.', anchor: 'c', size: 'l' });
  await sleep(1300); if (!alive()) return;
  addPhrase({ html: 'Uite.', anchor: 'br', size: 'l', tilt: 5 });
  await sleep(1100); if (!alive()) return;

  // ── Act 2 — Tu (focused stage, interactive) ──────────────────────
  await clearPhrases(); if (!alive()) return;
  setAct(2);
  setLayoutMode('stage');
  setOrbState('listening');
  setOrbEmotion('neutral');
  renderActTwoStageCode();
  setStageCaption('Atinge un <em>număr</em> &mdash; vezi cum se mişcă <em>range(N)</em>');
  stageHint.textContent = '↓ alege N';
  clearStageOutput();

  await sleep(550); if (!alive()) return;
  const result = await runExperiment();
  hidePointer();
  if (!alive()) return;

  // ── Act 3 — Aha (Cascade spread + XP overlay) ───────────────────
  await hideExperiment(); if (!alive()) return;
  await sleep(280); if (!alive()) return;
  setLayoutMode('spread');
  setSpreadVariant('cascade');
  setAct(3);
  setOrbState('celebrating');
  setOrbEmotion('celebrating');

  addPhrase({ html: '<em>Perfect.</em>',          anchor: 'tl', size: 'xl', tilt: -4 });
  addPhrase({ html: 'Acum şti <em>range(N)</em>.', anchor: 'br', size: 'l',  tilt: 4 });

  await sleep(900); if (!alive()) return;
  showAha();
  await sleep(2200); if (!alive()) return;
  hideAha();
  await sleep(400); if (!alive()) return;

  // ── Act 4 — Mai mult / Mostre (Orbital spread + auto demos) ─────
  await clearPhrases(); if (!alive()) return;
  setAct(4);
  await runMostre();
  if (!alive()) return;

  // ── Act 5 — Practică (flash deck → 4 MC → finale) ───────────────
  await clearPhrases(); if (!alive()) return;
  setLayoutMode('spread');
  // Flash deck (Pokémon-Go) — Spotlight feel
  setSpreadVariant('spotlight');
  setAct(5);
  await openFlashDeck();
  if (!alive()) return;

  await runPractica();
  if (!alive()) return;

  // After finale closes, show the glossary footer button for review.
  showGlossButton();
}

// ─────────────────────────────────────────────────────────────────────
// 15. Reset + dev jump bar.
// ─────────────────────────────────────────────────────────────────────
function resetAll() {
  iterToken++;
  mostreSkipFlag = true;
  hideMostreSkip();
  livePhrases.length = 0;
  phrasesHost.innerHTML = '';
  ahaOverlay.style.opacity = '0';
  finaleOverlay.classList.remove('is-open');
  closeFlashDeck();
  cardsGrid.innerHTML = '';
  answersGrid.innerHTML = '';
  taskPrompt.innerHTML = '';
  scoreBar.style.opacity = 0;
  scoreStars.innerHTML = '';
  clearStageOutput();
  renderActTwoStageCode();
  stageCaption.innerHTML = 'Atinge un <em>număr</em> &mdash; vezi cum se mişcă <em>range(N)</em>';
  stageHint.textContent = '↓ alege N';
  setOrbState('thinking');
  setOrbEmotion('neutral');
  setLayoutMode('spread');
  setSpreadVariant('cascade');
  setAct(1);
  hidePointer();
  hideGlossButton();
  // Reset orb rotation in case Orbital variant left a residual rotate.
  // Apply to the inner .orb only — orbHost transform is owned by
  // body.layout-* CSS rules.
  gsap.set(theOrb, { rotation: 0 });
  // Clear any stray inline transform on orbHost left over from older versions.
  orbHost.style.transform = '';
}

document.querySelectorAll('.c3d-dev [data-jump]').forEach((btn) => {
  btn.addEventListener('click', async () => {
    stopActiveFlow();
    await sleep(80);
    const j = +btn.dataset.jump;
    resetAll();
    if (j === 1) {
      runLoopsFlow();
    } else if (j === 2) {
      setAct(2);
      setLayoutMode('stage');
      setSpreadVariant('cascade');
      setOrbState('listening');
      renderActTwoStageCode();
      setStageCaption('Atinge un <em>număr</em> &mdash; vezi cum se mişcă <em>range(N)</em>');
      runExperiment().then(() => hidePointer());
    } else if (j === 3) {
      setAct(3);
      setLayoutMode('spread');
      setSpreadVariant('cascade');
      setOrbState('celebrating');
      setOrbEmotion('celebrating');
      addPhrase({ html: '<em>Perfect.</em>',          anchor: 'tl', size: 'xl', tilt: -4 });
      addPhrase({ html: 'Acum şti <em>range(N)</em>.', anchor: 'br', size: 'l',  tilt: 4 });
      await sleep(500);
      showAha();
    } else if (j === 4) {
      setAct(4);
      // explicitly clear the resetAll-installed skip flag
      mostreSkipFlag = false;
      runMostre();
    } else if (j === 5) {
      setAct(5);
      setSpreadVariant('spotlight');
      const r = await openFlashDeck();
      runPractica();
    }
  });
});

$('replay').addEventListener('click', async () => {
  stopActiveFlow();
  await sleep(80);
  hideAha();
  resetAll();
  runLoopsFlow();
});

// ─────────────────────────────────────────────────────────────────────
// 16. Auto-start.
// ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  setTimeout(() => runLoopsFlow(), 350);
});
</script>
